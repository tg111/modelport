<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ModelPort</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1 class="login-title">ModelPort</h1>
      <p class="login-sub">管理后台</p>
      <form id="loginForm" class="login-form">
        <input id="loginKey" type="password" placeholder="输入 API Key" autocomplete="current-password" required>
        <button type="submit">登录</button>
      </form>
      <p class="login-hint">Codex 调用反代时也使用同一个 Bearer API key。</p>
    </div>
  </div>

  <div id="appLayout" class="hidden">

    <header class="topbar">
      <div class="topbar-brand">
        <h1>ModelPort</h1>
        <p>Codex、聊天和图片接口的渠道管理、代理模型名和使用记录</p>
      </div>
      <div class="topbar-actions">
        <a class="icon-btn" href="https://github.com/tg111/modelport" target="_blank" rel="noreferrer" aria-label="GitHub" title="GitHub">
          <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2.02c-3.2.69-3.87-1.37-3.87-1.37-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.28-5.24-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.17 1.18.92-.26 1.9-.38 2.88-.39.98.01 1.96.13 2.88.39 2.2-1.49 3.16-1.18 3.16-1.18.63 1.58.24 2.75.12 3.04.74.8 1.18 1.83 1.18 3.08 0 4.41-2.69 5.38-5.25 5.67.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"></path>
          </svg>
        </a>
        <button id="logoutBtn" type="button" class="btn ghost">退出</button>
      </div>
    </header>

    <div class="content-wrap">

      <section class="section">
        <div class="section-header">
          <h3>渠道管理</h3>
          <div class="header-actions">
            <button id="refreshBtn" type="button" class="btn ghost">刷新</button>
            <button id="addChannelBtn" type="button" class="btn primary">添加渠道</button>
          </div>
        </div>
        <div class="channel-filter-bar">
          <label class="filter-search-wrap">
            <span class="filter-search-icon" aria-hidden="true">⌕</span>
            <input id="channelSearch" type="search" placeholder="输入渠道名称或 API 地址">
          </label>
          <div class="channel-visibility-control" role="group" aria-label="渠道展示范围">
            <button type="button" data-channel-visibility="enabled" aria-pressed="false">仅看启用</button>
            <button type="button" class="active" data-channel-visibility="all" aria-pressed="true">展示全部</button>
          </div>
          <div class="filter-sort-wrap">
            <span>排序</span>
            <select id="channelSort" class="filter-pill sort-select">
              <option value="created_desc">最新添加优先</option>
              <option value="created_asc">最早添加优先</option>
              <option value="name_asc">名称（字典序）</option>
              <option value="success_desc">成功多的优先</option>
              <option value="success_asc">成功少的优先</option>
            </select>
          </div>
          <div class="model-filter-dropdown" id="proxyModelDropdown">
            <button id="proxyModelFilterBtn" type="button" class="filter-pill model-filter-btn">
              <span class="filter-slider-icon" aria-hidden="true">☷</span>
              <span id="proxyModelFilterText">0/0 个模型</span>
              <span class="filter-chevron" aria-hidden="true">⌄</span>
            </button>
            <div id="proxyModelFilterPanel" class="model-filter-panel hidden">
              <div class="model-filter-panel-actions">
                <button id="selectAllProxyModels" type="button">全选</button>
                <button id="clearChannelFilters" type="button">清空</button>
              </div>
              <div id="proxyModelFilterList" class="model-filter-list"></div>
            </div>
          </div>
        </div>
        <div id="channels" class="channel-list"></div>
      </section>

      <section class="section">
        <div class="section-header">
          <h3>使用记录</h3>
          <div class="header-actions">
            <select id="usageModelFilter" class="input-sm" aria-label="模型筛选">
              <option value="">全部模型</option>
            </select>
            <select id="usageChannelFilter" class="input-sm" aria-label="渠道筛选">
              <option value="">全部渠道</option>
            </select>
            <select id="usageStatusFilter" class="input-sm">
              <option value="all">全部</option>
              <option value="success">仅成功</option>
              <option value="failed">仅失败</option>
            </select>
            <button id="usageBtn" type="button" class="btn ghost">刷新</button>
            <button id="clearUsageBtn" type="button" class="btn danger">清空记录</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>状态</th>
                <th>模型</th>
                <th>源模型</th>
                <th>渠道</th>
                <th class="usage-ip-heading">IP <button id="usageIpToggle" type="button" class="table-icon-btn" aria-label="显示真实 IP" title="显示真实 IP"><img src="/assets/icons/eye.svg" alt="" aria-hidden="true"></button></th>
                <th>耗时</th>
                <th>Token</th>
                <th>错误</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="usageRows"></tbody>
          </table>
        </div>
        <div class="pagination-bar" id="usagePagination">
          <div class="pagination-summary" id="usagePageSummary">第 1 / 1 页，共 0 条</div>
          <div class="pagination-actions">
            <select id="usagePageSize" class="input-sm" aria-label="每页条数">
              <option value="10">10 条/页</option>
              <option value="20" selected>20 条/页</option>
              <option value="50">50 条/页</option>
              <option value="100">100 条/页</option>
            </select>
            <button id="usagePrevPage" type="button" class="btn ghost">上一页</button>
            <button id="usageNextPage" type="button" class="btn ghost">下一页</button>
          </div>
        </div>
      </section>

    </div>
  </div>

  <div id="addModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="addTitle">添加渠道</h3>
        <button id="addCloseBtn" type="button" class="icon-btn">&#x2715;</button>
      </div>
      <form id="channelForm" class="form-stack">
        <label class="field">
          <span>渠道名称</span>
          <input name="note" placeholder="OpenAI 主账号、备用渠道等">
        </label>
        <label class="field">
          <span>渠道官网</span>
          <input name="providerLink" placeholder="https://example.com">
        </label>
        <label class="field">
          <span>API 地址 <em class="required-tag">必填</em></span>
          <input name="apiBase" placeholder="https://api.openai.com 或 https://api.openai.com/v1" required>
        </label>
        <label class="field">
          <span>密钥</span>
          <div class="secret-input-wrap">
            <input name="apiKey" type="password" autocomplete="off">
            <div class="secret-actions">
              <button type="button" class="secret-icon-btn" data-secret-toggle aria-label="显示密钥" title="显示密钥">
                <img src="/assets/icons/eye.svg" alt="" aria-hidden="true">
              </button>
              <button type="button" class="secret-icon-btn" data-secret-copy aria-label="复制密钥" title="复制密钥">
                <img src="/assets/icons/copy.svg" alt="" aria-hidden="true">
              </button>
            </div>
          </div>
        </label>
        <label class="field">
          <span>渠道协议</span>
          <select name="protocol">
            <option value="auto" selected>自动识别</option>
            <option value="responses">Responses 原生</option>
            <option value="chat">Chat Completions 兼容</option>
          </select>
          <p class="field-hint" data-protocol-auto-hint>自动识别会向上游发送一次最小化协议探测请求。明确禁止测试请求的渠道请手动选择协议。</p>
        </label>
        <div class="form-actions">
          <button type="button" class="btn ghost" id="addCancelBtn">取消</button>
          <button type="submit" class="btn primary">保存渠道</button>
        </div>
      </form>
    </div>
  </div>

  <div id="editModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="editTitle">编辑渠道</h3>
        <button id="editCloseBtn" type="button" class="icon-btn">&#x2715;</button>
      </div>
      <form id="editForm" class="form-stack">
        <input name="id" type="hidden">
        <label class="field">
          <span>渠道名称</span>
          <input name="note">
        </label>
        <label class="field">
          <span>渠道官网</span>
          <input name="providerLink">
        </label>
        <label class="field">
          <span>API 地址 <em class="required-tag">必填</em></span>
          <input name="apiBase" required>
        </label>
        <label class="field">
          <span>密钥</span>
          <div class="secret-input-wrap">
            <input name="apiKey" type="password" autocomplete="off">
            <div class="secret-actions">
              <button type="button" class="secret-icon-btn" data-secret-toggle aria-label="显示密钥" title="显示密钥">
                <img src="/assets/icons/eye.svg" alt="" aria-hidden="true">
              </button>
              <button type="button" class="secret-icon-btn" data-secret-copy aria-label="复制密钥" title="复制密钥">
                <img src="/assets/icons/copy.svg" alt="" aria-hidden="true">
              </button>
            </div>
          </div>
        </label>
        <label class="field">
          <span>渠道协议</span>
          <select name="protocol">
            <option value="auto">自动识别</option>
            <option value="responses">Responses 原生</option>
            <option value="chat">Chat Completions 兼容</option>
          </select>
          <p class="field-hint" data-protocol-auto-hint>自动识别会向上游发送一次最小化协议探测请求。明确禁止测试请求的渠道请手动选择协议。</p>
        </label>
        <div class="form-actions">
          <button type="button" class="btn ghost" id="editCancelBtn">取消</button>
          <button type="submit" class="btn primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="errorModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="errorModalTitle">
    <div class="modal-card error-modal-card">
      <div class="modal-head">
        <h3 id="errorModalTitle">错误详情</h3>
        <button id="errorCloseBtn" type="button" class="icon-btn" aria-label="关闭">&#x2715;</button>
      </div>
      <pre id="errorDetailText" class="error-detail-text"></pre>
      <div class="form-actions">
        <button id="errorCopyBtn" type="button" class="btn primary">
          <img class="btn-icon" src="/assets/icons/copy.svg" alt="" aria-hidden="true">
          复制错误
        </button>
      </div>
    </div>
  </div>

  <div id="errorTooltip" class="error-tooltip hidden" role="tooltip"></div>
  <div id="toast" class="toast hidden"></div>
  <script src="/assets/app.js"></script>
</body>
</html>
